<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 Snake!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Fredoka One', 'Comic Sans MS', cursive;
      color: #fff;
      user-select: none;
    }
    #game-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #hud {
      width: 480px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 18px;
    }
    #hud-score { flex: 1; text-align: left; }
    #hud-stage { flex: 1; text-align: center; }
    #hud-lives { flex: 1; text-align: right; }
    #food-counter {
      font-size: 16px;
      opacity: 0.85;
      letter-spacing: 1px;
    }
    #canvas-container {
      position: relative;
      display: inline-block;
    }
    #canvas {
      display: block;
      border-radius: 8px;
    }
    #overlay-btn-container {
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }
    .overlay-btn {
      padding: 12px 32px;
      font-family: 'Fredoka One', 'Comic Sans MS', cursive;
      font-size: 22px;
      border: none;
      border-radius: 50px;
      background: #ffd166;
      color: #333;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .overlay-btn:hover { transform: scale(1.07); }
    .overlay-btn:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <div id="hud">
      <span id="hud-score">Score: 0</span>
      <span id="hud-stage">🌿 Jungle</span>
      <span id="hud-lives">❤️❤️❤️</span>
    </div>
    <div id="food-counter">🍎 0 / 10</div>
    <div id="canvas-container">
      <canvas id="canvas" width="480" height="480"></canvas>
      <div id="overlay-btn-container"></div>
    </div>
  </div>
  <script>
    /* ALL JS GOES HERE — assembled below */

    // 1. Constants and stage config
    const CELL = 24;
    const COLS = 20;
    const ROWS = 20;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const STAGES = [
      { name: '🌿 Jungle', bg: '#1a472a', snake: '#6bcb77', food: '#ff4d4d', foodEmoji: '🍎', speed: 200, borderStyle: 'leaf' },
      { name: '🌊 Ocean',  bg: '#0d3b6e', snake: '#00b4d8', food: '#ffd166', foodEmoji: '🐟', speed: 150, borderStyle: 'wave' },
      { name: '🚀 Space',  bg: '#0d0221', snake: '#c77dff', food: '#ffd700', foodEmoji: '⭐', speed: 100, borderStyle: 'stars' },
    ];

    const FOOD_PER_STAGE = 10;
    const DIRS = {
      ArrowUp:    { x: 0, y: -1 },
      ArrowDown:  { x: 0, y:  1 },
      ArrowLeft:  { x: -1, y: 0 },
      ArrowRight: { x:  1, y: 0 },
    };
    const OPPOSITE = {
      ArrowUp: 'ArrowDown', ArrowDown: 'ArrowUp',
      ArrowLeft: 'ArrowRight', ArrowRight: 'ArrowLeft',
    };

    // Decorative 4×4 cell loop path (12 cells, counterclockwise)
    const DECO_LOOP = (() => {
      const sx = Math.round((COLS - 4) / 2); // column 8
      const sy = Math.round(60 / CELL);      // row 2
      const path = [];
      for (let x = sx; x < sx + 4; x++)      path.push({ x, y: sy });       // top L→R
      for (let y = sy + 1; y < sy + 4; y++)  path.push({ x: sx + 3, y });   // right T→B
      for (let x = sx + 2; x >= sx; x--)    path.push({ x, y: sy + 3 });   // bottom R→L
      for (let y = sy + 2; y > sy; y--)     path.push({ x: sx, y });       // left B→T
      return path; // 12 positions
    })();

    let audioCtx = null;
    let musicTimeout = null;
    let decoFrame = 0;
    let decoLoopId = null;

    // 2. State management
    let state = {};

    function createSnake() {
      return [
        { x: 10, y: 10 },
        { x:  9, y: 10 },
        { x:  8, y: 10 },
      ];
    }

    function spawnFood(snake) {
      const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
      let cell, attempts = 0;
      do {
        cell = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS),
        };
        attempts++;
      } while (occupied.has(`${cell.x},${cell.y}`) && attempts < 400);
      return cell;
    }

    function initState() {
      const snake = createSnake();
      state = {
        screen: 'start',
        stageIdx: 0,
        score: 0,
        lives: 3,
        snake,
        dir: { x: 1, y: 0 },
        nextDir: { x: 1, y: 0 },
        currentDirKey: 'ArrowRight',
        food: spawnFood(snake),
        foodEaten: 0,
        loopId: null,
        rafId: null,
        flashing: false,
        muted: false,
        resetCount: 0,
      };
    }

    initState();

    // 3. Rendering helpers
    function lighten(hex, amount) {
      const num = parseInt(hex.slice(1), 16);
      const r = Math.min(255, (num >> 16) + amount);
      const g = Math.min(255, ((num >> 8) & 0xff) + amount);
      const b = Math.min(255, (num & 0xff) + amount);
      return `rgb(${r},${g},${b})`;
    }

    function drawBackground() {
      const stage = STAGES[state.stageIdx];
      ctx.fillStyle = stage.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      if (stage.borderStyle === 'leaf')  drawLeafBorder();
      if (stage.borderStyle === 'wave')  drawWaveBorder();
      if (stage.borderStyle === 'stars') drawStarsBorder();
    }

    function drawLeafBorder() {
      ctx.save();
      ctx.fillStyle = '#2d6a4f';
      for (let x = 0; x < COLS; x += 2) {
        drawLeaf(x * CELL + CELL / 2, 8);
        drawLeaf(x * CELL + CELL / 2, canvas.height - 8);
      }
      for (let y = 0; y < ROWS; y += 2) {
        drawLeaf(8, y * CELL + CELL / 2);
        drawLeaf(canvas.width - 8, y * CELL + CELL / 2);
      }
      ctx.restore();
    }

    function drawLeaf(x, y) {
      ctx.beginPath();
      ctx.ellipse(x, y, 10, 5, Math.PI / 4, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawWaveBorder() {
      ctx.save();
      ctx.strokeStyle = '#48cae4';
      ctx.lineWidth = 3;
      ctx.setLineDash([8, 6]);
      ctx.beginPath();
      for (let x = 0; x <= canvas.width; x += 12) {
        const y = 10 + Math.sin((x / canvas.width) * Math.PI * 4) * 4;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.beginPath();
      for (let x = 0; x <= canvas.width; x += 12) {
        const y = canvas.height - 10 + Math.sin((x / canvas.width) * Math.PI * 4) * 4;
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }

    function drawStarsBorder() {
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      const positions = [
        {x:20,y:20},{x:60,y:15},{x:110,y:25},{x:170,y:10},{x:240,y:20},
        {x:300,y:15},{x:360,y:22},{x:420,y:12},{x:470,y:20},
        {x:20,y:465},{x:80,y:470},{x:150,y:460},{x:220,y:468},
        {x:290,y:462},{x:350,y:470},{x:410,y:460},{x:460,y:468},
        {x:10,y:60},{x:15,y:130},{x:8,y:200},{x:14,y:270},{x:10,y:340},{x:16,y:410},
        {x:470,y:60},{x:465,y:140},{x:472,y:210},{x:468,y:280},{x:474,y:350},{x:470,y:420},
      ];
      positions.forEach(({ x, y }) => {
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function drawSnake() {
      const stage = STAGES[state.stageIdx];
      state.snake.forEach((seg, i) => {
        const isHead = i === 0;
        const isTail = i === state.snake.length - 1;
        // CELL-6 = 18px in a 24px cell → 6px gap between segments (intentional)
        const size = isTail ? Math.round(CELL * 0.70) : CELL - 6;
        const offset = (CELL - size) / 2;
        const px = seg.x * CELL + offset;
        const py = seg.y * CELL + offset;
        const r = Math.round(size * 0.35);

        ctx.fillStyle = isHead ? lighten(stage.snake, 25) : stage.snake;
        roundRect(px, py, size, size, r);
        ctx.fill();

        if (isHead) drawSnakeEyes(px, py, size);
      });
    }

    function drawSnakeEyes(px, py, size) {
      ctx.fillStyle = '#fff';
      const d = state.dir;
      let e1, e2;
      if (d.x === 1) {
        e1 = { x: px + size - 7, y: py + 4 };
        e2 = { x: px + size - 7, y: py + size - 7 };
      } else if (d.x === -1) {
        e1 = { x: px + 4, y: py + 4 };
        e2 = { x: px + 4, y: py + size - 7 };
      } else if (d.y === -1) {
        e1 = { x: px + 4,        y: py + 4 };
        e2 = { x: px + size - 7, y: py + 4 };
      } else {
        e1 = { x: px + 4,        y: py + size - 7 };
        e2 = { x: px + size - 7, y: py + size - 7 };
      }
      ctx.beginPath(); ctx.arc(e1.x, e1.y, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2.x, e2.y, 3, 0, Math.PI * 2); ctx.fill();
    }

    function drawFood() {
      const stage = STAGES[state.stageIdx];
      const cx = state.food.x * CELL + CELL / 2;
      const cy = state.food.y * CELL + CELL / 2;
      ctx.save();
      ctx.shadowBlur = 10;
      ctx.shadowColor = stage.food;
      ctx.fillStyle = stage.food;
      if (state.stageIdx === 0) drawApple(cx, cy);
      else if (state.stageIdx === 1) drawFish(cx, cy);
      else drawStar(cx, cy);
      ctx.restore();
    }

    function drawApple(cx, cy) {
      ctx.beginPath();
      ctx.arc(cx, cy + 1, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#4caf50';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx, cy - 8);
      ctx.lineTo(cx, cy - 13);
      ctx.stroke();
    }

    function drawFish(cx, cy) {
      ctx.beginPath();
      ctx.ellipse(cx + 2, cy, 10, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx - 8, cy);
      ctx.lineTo(cx - 16, cy - 6);
      ctx.lineTo(cx - 16, cy + 6);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(cx + 7, cy - 1, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawStar(cx, cy) {
      const outer = 10, inner = 5, points = 5;
      ctx.beginPath();
      for (let i = 0; i < points * 2; i++) {
        const r = i % 2 === 0 ? outer : inner;
        const angle = (i * Math.PI) / points - Math.PI / 2;
        i === 0
          ? ctx.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle))
          : ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
      }
      ctx.closePath();
      ctx.fill();
    }

    function render() {
      drawBackground();
      drawSnake();
      drawFood();
    }

    // 4. HUD and game flow
    function updateHUD() {
      const stage = STAGES[state.stageIdx];
      document.getElementById('hud-score').textContent = `Score: ${state.score}`;
      document.getElementById('hud-stage').textContent = stage.name;
      document.getElementById('hud-lives').textContent = '❤️'.repeat(state.lives);
      document.getElementById('food-counter').textContent =
        `${stage.foodEmoji} ${state.foodEaten} / ${FOOD_PER_STAGE}`;
    }

    function startLoop() {
      state.loopId = setInterval(tick, STAGES[state.stageIdx].speed);
    }

    function stopLoop() {
      if (state.loopId) { clearInterval(state.loopId); state.loopId = null; }
    }

    function startGame() {
      state.screen = 'play';
      stopDecoLoop();
      document.getElementById('hud').style.visibility = 'visible';
      document.getElementById('food-counter').style.visibility = 'visible';
      updateHUD();
      startLoop();
      startMusic(state.stageIdx);
    }

    function clearOverlayBtn() {
      const container = document.getElementById('overlay-btn-container');
      while (container.firstChild) container.removeChild(container.firstChild);
    }

    function showButton(id, label, onClick) {
      clearOverlayBtn();
      const btn = document.createElement('button');
      btn.id = id;
      btn.className = 'overlay-btn';
      btn.textContent = label;
      btn.addEventListener('click', () => { clearOverlayBtn(); onClick(); });
      document.getElementById('overlay-btn-container').appendChild(btn);
    }

    function fullReset() {
      if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = null; }
      stopLoop();
      stopMusic();
      clearOverlayBtn();
      initState();              // sets screen:'start' — overridden on next line
      state.resetCount = (state.resetCount || 0) + 1;
      state.screen = 'play';   // skip start screen after first play
      document.getElementById('hud').style.visibility = 'visible';
      document.getElementById('food-counter').style.visibility = 'visible';
      updateHUD();
      render();
      startLoop();
      startMusic(0);
    }

    // 5. Game tick and food logic
    function handleFoodEaten() {
      playEatSound(state.stageIdx);
      state.score += (state.stageIdx + 1) * 10;
      state.foodEaten += 1;
      updateHUD();
      if (state.foodEaten >= FOOD_PER_STAGE) {
        stopLoop();
        if (state.stageIdx === STAGES.length - 1) {
          showVictory();
        } else {
          stopMusic();
          playSound('stageClear');
          showStageClear();
        }
      } else {
        state.food = spawnFood(state.snake);
      }
    }

    function tick() {
      state.dir = state.nextDir;
      const head = state.snake[0];
      const newHead = { x: head.x + state.dir.x, y: head.y + state.dir.y };

      if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS) {
        handleCollision(); return;
      }
      const ateFood = newHead.x === state.food.x && newHead.y === state.food.y;
      const bodyToCheck = ateFood ? state.snake : state.snake.slice(0, -1);
      if (bodyToCheck.some(s => s.x === newHead.x && s.y === newHead.y)) {
        handleCollision(); return;
      }

      state.snake.unshift(newHead);
      if (!ateFood) {
        state.snake.pop();
      } else {
        handleFoodEaten();
      }
      render();
    }

    // 6. Collision and overlay screens
    function handleCollision() {
      stopLoop();
      state.lives -= 1;
      playSound('death');
      state.flashing = true;
      const snapshotReset = state.resetCount;

      ctx.fillStyle = 'rgba(255,0,0,0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      setTimeout(() => {
        if (state.resetCount !== snapshotReset) return;
        state.flashing = false;
        if (state.lives <= 0) {
          showGameOver();
        } else {
          state.snake = createSnake();
          state.dir = { x: 1, y: 0 };
          state.nextDir = { x: 1, y: 0 };
          state.currentDirKey = 'ArrowRight';
          updateHUD();
          render();
          startLoop();
        }
      }, 500);
    }

    function showGameOver() {
      stopMusic();
      state.screen = 'gameover';
      render();
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ff6b6b';
      ctx.font = '48px "Fredoka One", cursive';
      ctx.fillText('Game Over 💀', canvas.width / 2, canvas.height / 2 - 40);
      ctx.fillStyle = '#fff';
      ctx.font = '28px "Fredoka One", cursive';
      ctx.fillText(`Final Score: ${state.score}`, canvas.width / 2, canvas.height / 2 + 20);
      showButton('tryAgainBtn', 'Try Again 🔄', () => fullReset());
    }

    function showStageClear() {
      state.screen = 'stageclear';
      stopLoop();
      render();
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = 'center';
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffd166';
      ctx.font = '42px "Fredoka One", cursive';
      ctx.fillText('Stage Complete! 🎉', canvas.width / 2, canvas.height / 2 - 30);
      ctx.fillStyle = '#fff';
      ctx.font = '26px "Fredoka One", cursive';
      ctx.fillText(`Score: ${state.score}`, canvas.width / 2, canvas.height / 2 + 20);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '18px "Fredoka One", cursive';
      ctx.fillText('Get ready...', canvas.width / 2, canvas.height / 2 + 60);

      const snapshotReset = state.resetCount;
      musicTimeout = setTimeout(() => {
        if (state.resetCount !== snapshotReset) return;
        if (state.stageIdx >= STAGES.length - 1) return;
        state.stageIdx += 1;
        state.foodEaten = 0;
        state.snake = createSnake();
        state.dir = { x: 1, y: 0 };
        state.nextDir = { x: 1, y: 0 };
        state.currentDirKey = 'ArrowRight';
        state.food = spawnFood(state.snake);
        state.screen = 'play';
        updateHUD();
        startLoop();
        startMusic(state.stageIdx);
      }, 2000);
    }

    const CONFETTI_COLORS = ['#ff6b6b','#ffd166','#06d6a0','#118ab2','#c77dff','#ff9f43','#48dbfb'];

    function initConfetti() {
      return Array.from({ length: 80 }, () => ({
        x: Math.random() * canvas.width,
        y: -8 - Math.random() * canvas.height,
        speed: 2 + Math.random() * 2,
        drift: (Math.random() - 0.5) * 2,
        color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
      }));
    }

    function showVictory() {
      stopMusic();
      playSound('victory');
      state.screen = 'victory';
      stopLoop();
      stopDecoLoop();
      const particles = initConfetti();

      function victoryLoop() {
        if (state.screen !== 'victory') return;
        render();
        ctx.fillStyle = 'rgba(0,0,0,0.60)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        particles.forEach(p => {
          ctx.fillStyle = p.color;
          ctx.fillRect(p.x, p.y, 8, 8);
          p.y += p.speed;
          p.x += p.drift;
          if (p.y > canvas.height || p.x < -8 || p.x > canvas.width + 8) {
            p.y = -8;
            p.x = Math.random() * canvas.width;
          }
        });

        ctx.textAlign = 'center';
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffd700';
        ctx.font = '52px "Fredoka One", cursive';
        ctx.fillText('You Win! 🏆', canvas.width / 2, canvas.height / 2 - 50);
        ctx.fillStyle = '#fff';
        ctx.font = '28px "Fredoka One", cursive';
        ctx.fillText(`Final Score: ${state.score}`, canvas.width / 2, canvas.height / 2 + 10);
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '20px "Fredoka One", cursive';
        ctx.fillText('Amazing! 🎊', canvas.width / 2, canvas.height / 2 + 48);

        state.rafId = requestAnimationFrame(victoryLoop);
      }
      state.rafId = requestAnimationFrame(victoryLoop);
      showButton('playAgainBtn', 'Play Again ✨', () => fullReset());
    }

    // 7. Input handler
    document.addEventListener('keydown', (e) => {
      if (state.screen === 'start' && DIRS[e.key]) {
      e.preventDefault();
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      startGame();
        return;
    }
      if (state.screen !== 'play' || state.flashing) return;
      if (!DIRS[e.key]) return;
      e.preventDefault();
      if (e.key === OPPOSITE[state.currentDirKey]) return;
      state.nextDir = DIRS[e.key];
      state.currentDirKey = e.key;
    });

    // 8. Deco loop and start screen
    function drawStartScreen() {
      ctx.fillStyle = STAGES[0].bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawLeafBorder();

      // Decorative 5-segment snake — parens required for correct modulo
      for (let i = 0; i < 5; i++) {
        const pos = DECO_LOOP[(decoFrame + i) % DECO_LOOP.length];
        const size = CELL - 6;
        const off = (CELL - size) / 2;
        ctx.fillStyle = i === 0 ? lighten(STAGES[0].snake, 25) : STAGES[0].snake;
        roundRect(pos.x * CELL + off, pos.y * CELL + off, size, size, Math.round(size * 0.35));
        ctx.fill();
      }

      ctx.textAlign = 'center';
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffd166';
      ctx.font = 'bold 56px "Fredoka One", cursive';
      ctx.fillText('🐍 Snake!', canvas.width / 2, 280);
      ctx.fillStyle = '#6bcb77';
      ctx.font = '28px "Fredoka One", cursive';
      ctx.fillText('🌿 Jungle', canvas.width / 2, 322);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = '20px "Fredoka One", cursive';
      ctx.fillText('Press any arrow key to start', canvas.width / 2, 372);
    }

    function startDecoLoop() {
      decoFrame = 0;
      decoLoopId = setInterval(() => {
        decoFrame = (decoFrame + 1) % DECO_LOOP.length;
        if (state.screen === 'start') drawStartScreen();
        else stopDecoLoop();
      }, 200);
    }

    function stopDecoLoop() {
      if (decoLoopId) { clearInterval(decoLoopId); decoLoopId = null; }
    }

    // 10. Audio system
    function stopMusic() {
      clearTimeout(musicTimeout);
      musicTimeout = null;
    }

    function startMusic(stageIdx) {
      if (!audioCtx || state.muted) return;
      stopMusic(); // cancel any pending loop or stage-clear timer
      const melodies = [
        // Jungle: square wave, 160 BPM (~0.375s/beat → 0.18s notes)
        { type: 'square',   notes: [[523,0.18],[659,0.18],[784,0.18],[659,0.18],[523,0.18],[392,0.18],[659,0.18],[523,0.36]] },
        // Ocean: sine wave, 100 BPM (~0.6s/beat → 0.3s notes)
        { type: 'sine',     notes: [[262,0.3],[330,0.3],[392,0.3],[440,0.3],[392,0.3],[330,0.6]] },
        // Space: sawtooth wave, 130 BPM (~0.46s/beat → 0.23s notes)
        { type: 'sawtooth', notes: [[220,0.23],[330,0.23],[440,0.23],[523,0.23],[659,0.23],[440,0.23],[330,0.23],[220,0.46]] },
      ];
      const melody = melodies[stageIdx];

      function scheduleMelody() {
        if (!audioCtx || state.muted) return;
        let t = audioCtx.currentTime + 0.05; // small scheduling lookahead
        let total = 0;
        melody.notes.forEach(([freq, dur]) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = melody.type;
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.08, t);
          gain.gain.linearRampToValueAtTime(0, t + dur - 0.01);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(t);
          osc.stop(t + dur);
          t += dur;
          total += dur;
        });
        musicTimeout = setTimeout(scheduleMelody, total * 1000);
      }
      scheduleMelody();
    }

    function playEatSound(stageIdx) {
      if (!audioCtx || state.muted) return;
      const configs = [
        { type: 'square',   startF: 400, endF: 800,  dur: 0.12 }, // Jungle: bright chirp
        { type: 'sine',     startF: 600, endF: 200,  dur: 0.15 }, // Ocean: bubble pop
        { type: 'sawtooth', startF: 300, endF: 1200, dur: 0.08 }, // Space: laser zap
      ];
      const { type, startF, endF, dur } = configs[stageIdx];
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(startF, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(endF, audioCtx.currentTime + dur);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + dur);
    }

    function playSound(name) {
      if (!audioCtx || state.muted) return;

      if (name === 'death') {
        // Low descending wah: 400->100 Hz over 0.4s
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      }

      if (name === 'stageClear') {
        // 3-note ascending fanfare: C5->E5->G5, each 0.15s
        [[523, 0], [659, 0.15], [784, 0.30]].forEach(([freq, offset]) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.value = freq;
          const t = audioCtx.currentTime + offset;
          gain.gain.setValueAtTime(0.12, t);
          gain.gain.linearRampToValueAtTime(0, t + 0.13);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(t);
          osc.stop(t + 0.15);
        });
      }

      if (name === 'victory') {
        // 5-note arpeggio: C5->E5->G5->C6->E6, each 0.12s
        [[523, 0], [659, 0.12], [784, 0.24], [1047, 0.36], [1319, 0.48]].forEach(([freq, offset]) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.value = freq;
          const t = audioCtx.currentTime + offset;
          gain.gain.setValueAtTime(0.12, t);
          gain.gain.linearRampToValueAtTime(0, t + 0.10);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(t);
          osc.stop(t + 0.12);
        });
      }
    }

    // 9. Initial setup — show start screen
    document.getElementById('hud').style.visibility = 'hidden';
    document.getElementById('food-counter').style.visibility = 'hidden';
    drawStartScreen();
    startDecoLoop();
  </script>
</body>
